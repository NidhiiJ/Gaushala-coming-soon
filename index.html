<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suri Prem Jiv Raksha Kendra Sansthan — Coming Soon</title>
  <link rel="icon" type="image/x-icon" href="assets/img/logo.png" />

  <!-- Preload hero images for faster LCP -->
  <link rel="preload" as="image" href="assets/img/IMG_5217.JPG" media="(min-width: 901px)" fetchpriority="high" />
  <link rel="preload" as="image" href="assets/img/IMG_5398.jpeg" media="(max-width: 900px)" fetchpriority="high" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FAFAF8;
      --text-primary: #1C1C1A;
      --text-muted: #8C8C88;
      --text-light: #B8B8B3;
      --accent: #C4955A;
      --accent-light: #F0E6D4;
      --placeholder-bg: #EEECEA;
      --placeholder-border: #E0DED9;
      --footer-bg: #1C1C1A;
      --footer-text: #8C8C88;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── MAIN LAYOUT ─── */
    .landing {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 72px);
    }

    /* ─── LEFT PANEL ─── */
    .left-panel {
      flex: 0 0 52%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 72px 72px 80px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    /* COMING SOON BADGE */
    .coming-soon-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 40px;
    }

    .coming-soon-label::before {
      content: '';
      display: inline-block;
      width: 28px;
      height: 1.5px;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* LOGO */
    .logo-wrap {
      margin-bottom: 28px;
    }

    .logo-wrap img {
      height: 101px;
      width: auto;
      display: block;
    }

    /* ORG NAME */
    .org-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 3.2vw, 48px);
      font-weight: 700;
      line-height: 1.18;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      max-width: 520px;
    }

    .org-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 56px;
    }

    /* COUNTDOWN */
    .countdown-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 18px;
    }

    .countdown {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .cd-box {
      width: 74px;
      height: 74px;
      border: 2px dotted var(--placeholder-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      background: #fff;
      transition: border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .cd-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(196,149,90,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .cd-box:hover {
      border-color: var(--accent);
    }

    .cd-unit {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .cd-sep {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--placeholder-border);
      margin-top: 18px;
      user-select: none;
    }

    /* ─── RIGHT PANEL ─── */
    .right-panel {
      flex: 0 0 48%;
      background-color: var(--placeholder-bg);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    .right-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 40%, rgba(196,149,90,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(196,149,90,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .right-panel picture {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--footer-bg);
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    footer p {
      font-size: 12.5px;
      font-weight: 400;
      color: var(--footer-text);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }

    footer a:hover {
      opacity: 0.75;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .landing {
        flex-direction: column;
        min-height: auto;
      }

      .left-panel {
        flex: none;
        padding: 60px 36px 48px;
      }

      .right-panel {
        flex: none;
        height: 300px;
      }

      .org-name {
        font-size: clamp(24px, 6vw, 36px);
      }

      .cd-box {
        width: 62px;
        height: 62px;
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .left-panel {
        padding: 48px 28px 40px;
      }

      .cd-box {
        width: 54px;
        height: 54px;
        font-size: 18px;
        border-radius: 10px;
      }

      .cd-sep {
        font-size: 16px;
        margin-top: 14px;
      }

      .countdown {
        gap: 10px;
      }

      .right-panel {
        height: 240px;
      }
    }
  </style>
</head>

<body>

  <main class="landing">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <div class="coming-soon-label">Coming Soon</div>

      <div class="logo-wrap">
        <img src="assets/img/logo.png" alt="Suri Prem Jiv Raksha Kendra Sansthan Logo" />
      </div>

      <h1 class="org-name">Suri Prem Jiv Raksha Kendra Sansthan</h1>
      <p class="org-subtitle">VAPS Pindwara</p>

      <p class="countdown-label">Launching in</p>

      <div class="countdown">
        <div class="cd-item">
          <div class="cd-box" id="cdD">00</div>
          <span class="cd-unit">Days</span>
        </div>

        <div class="cd-sep">:</div>

        <div class="cd-item">
          <div class="cd-box" id="cdH">00</div>
          <span class="cd-unit">Hours</span>
        </div>

        <div class="cd-sep">:</div>

        <div class="cd-item">
          <div class="cd-box" id="cdM">00</div>
          <span class="cd-unit">Mins</span>
        </div>

        <div class="cd-sep">:</div>

        <div class="cd-item">
          <div class="cd-box" id="cdS">00</div>
          <span class="cd-unit">Secs</span>
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL — full image -->
    <div class="right-panel">
      <picture>
        <source media="(max-width: 900px)" srcset="assets/img/IMG_5398.jpeg" type="image/jpeg" />
        <img
          src="assets/img/IMG_5217.JPG"
          alt="Suri Prem Jiv Raksha Kendra Sansthan"
          class="panel-image"
          fetchpriority="high"
          decoding="async"
          width="960"
          height="1280"
        />
      </picture>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>— Developed by <a href="https://www.flayk.in" target="_blank" rel="noopener noreferrer">FLAYK</a> —</p>
  </footer>

  <script>
    var countDownEndDate = "April 8, 2026 11:15:00";
    var endDate = new Date(countDownEndDate).getTime();

    function pad(n) {
      return n < 10 ? "0" + n : String(n);
    }

    var x = setInterval(function () {
      var timeNow = new Date().getTime();
      var timeLeft = endDate - timeNow;

      if (timeLeft <= 0) {
        clearInterval(x);
        return;
      }

      var days    = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
      var hours   = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

      document.getElementById("cdD").textContent = pad(days);
      document.getElementById("cdH").textContent = pad(hours);
      document.getElementById("cdM").textContent = pad(minutes);
      document.getElementById("cdS").textContent = pad(seconds);
    }, 1000);
  </script>

</body>
</html>
